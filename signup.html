<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign up • InterviewMate</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-wrap{min-height: calc(100vh - 120px); display:grid; place-items:center;}
    .auth-card{width:min(520px, 92vw); padding:26px;}
    .auth-title{font-size:34px; margin:0 0 4px}
    .auth-sub{color:var(--muted); margin:0 0 18px}
    .auth-form{display:grid; gap:12px; margin-top:10px}
    .auth-actions{display:grid; gap:10px; margin-top:10px}
    .auth-error{color:#c1121f; font-weight:600; margin-top:8px; min-height:20px}
    .auth-switch{margin-top:14px; color:var(--muted); font-size:13px}
    .auth-switch a{color:var(--primary); font-weight:700}
  </style>
</head>

<body>
  <div class="container topbar">
    <div class="nav">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span><span>Interviewmate</span>
      </a>

      <div class="navlinks">
        <a data-nav href="dashboard.html">Dashboard</a>
        <a data-nav href="mock.html">Mock interview</a>
        <a data-nav href="resume.html">Resume</a>
        <a data-nav href="history.html">History</a>
        <a data-nav href="#">Roadmap</a>
      </div>

      <!-- <div class="navright">
        <a class="btn" href="login.html">Login</a>
      </div> -->
    </div>
  </div>

  <div class="container page auth-wrap">
    <div class="panel auth-card">
      <h1 class="auth-title">Welcome 👋</h1>
      <p class="auth-sub">Create your account to continue.</p>

      <form id="signupForm" class="auth-form">
        <div>
          <label>Email</label>
          <input id="email" class="input" type="email" placeholder="you@example.com" required />
        </div>

        <div>
          <label>Password</label>
          <input id="password" class="input" type="password" placeholder="Minimum 6 characters" minlength="6" required />
        </div>

        <div class="auth-actions">
          <button class="btn primary block" type="submit" id="signupBtn">Sign up</button>
          <!-- <a class="btn block" href="login.html">I already have an account</a> -->
        </div>

        <div id="errorBox" class="auth-error"></div>

        <div class="auth-switch">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="signup.js"></script>
</body>
</html>
